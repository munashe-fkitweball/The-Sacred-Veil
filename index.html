<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>The Sacred Veil</title>
<link rel="icon" type="image/png" href="assets/sigil.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=UnifrakturCook:wght@700&display=swap');

*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh;background:#05030a;color:#d8c99b;font-family:'Cormorant Garamond',serif;overflow-x:hidden}

:root{
  --gold: #d8c99b;
  --gold-bright: #f2d98c;
  --gold-dim: rgba(200,160,80,0.55);
}

/* ═══════════════════════════════════════════════════════════════════════
   HOME PAGE — sigil + title + 7 entry buttons
   ═══════════════════════════════════════════════════════════════════════ */
.home{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:48px 24px;
  background:
    radial-gradient(ellipse at 50% 20%, rgba(130,80,160,0.18), transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(90,50,30,0.12), transparent 55%),
    #05030a;
  position:relative;
  overflow:hidden;
}

/* ── Sigil — large, prominent, glowing. 1024px asset rendered at ≤380px so it stays crisp. ── */
.home-sigil-wrap{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  position:relative;
}
.home-sigil{
  width:clamp(220px, 38vh, 380px);
  height:clamp(220px, 38vh, 380px);
  background:url('assets/sigil.png') center/contain no-repeat;
  filter:
    drop-shadow(0 0 30px rgba(215,170,85,0.45))
    drop-shadow(0 0 60px rgba(215,170,85,0.25))
    drop-shadow(0 0 120px rgba(130,80,160,0.35));
  animation:sigil-breathe 6s ease-in-out infinite;
}
@keyframes sigil-breathe{
  0%,100%{filter:
    drop-shadow(0 0 30px rgba(215,170,85,0.45))
    drop-shadow(0 0 60px rgba(215,170,85,0.25))
    drop-shadow(0 0 120px rgba(130,80,160,0.35));}
  50%{filter:
    drop-shadow(0 0 40px rgba(215,170,85,0.55))
    drop-shadow(0 0 80px rgba(215,170,85,0.35))
    drop-shadow(0 0 140px rgba(130,80,160,0.45));}
}

/* ── Title block ── */
.home-eyebrow{
  font-family:'Cinzel',serif;
  font-size:11px;letter-spacing:0.4em;text-transform:uppercase;
  color:rgba(200,160,80,0.6);
  margin-bottom:10px;text-align:center;
}
.home-title{
  font-family:'UnifrakturCook',serif;
  font-size:clamp(40px, 6.5vw, 72px);
  color:#e9d094;
  margin:0 0 8px;
  letter-spacing:0.02em;line-height:1.05;text-align:center;
  text-shadow:
    0 0 20px rgba(215,170,85,0.5),
    0 0 50px rgba(130,80,160,0.3);
}
.home-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(15px, 1.6vw, 20px);
  color:rgba(216,201,155,0.68);
  letter-spacing:0.12em;margin:0;
  text-align:center;
}

/* Spacer that pushes nav to the bottom */
.home-spacer{flex:1 1 auto;min-height:40px}

/* ── "Where would you like to start?" ── */
.home-prompt{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(18px, 2.2vw, 24px);
  color:rgba(216,201,155,0.72);
  text-align:center;
  margin:0 0 22px;
  letter-spacing:0.03em;
}

/* ── 7 entry buttons ── */
.home-nav{
  width:100%;max-width:1400px;
  display:grid;
  grid-template-columns:repeat(8, minmax(0, 1fr));
  gap:10px;
}
.home-nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px 10px;
  background:rgba(10,5,18,0.7);
  border:1px solid rgba(200,160,80,0.3);
  text-decoration:none;
  color:rgba(216,201,155,0.82);
  transition:all 0.25s ease;
  min-height:104px;
  position:relative;
}
.home-nav-item:hover{
  background:rgba(24,12,36,0.95);
  border-color:rgba(220,180,100,0.85);
  color:#f8e3a0;
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,0,0,0.7), 0 0 22px rgba(220,180,100,0.25);
}
.home-nav-num{
  font-family:'UnifrakturCook',serif;
  font-size:26px;
  color:rgba(200,160,80,0.78);
  margin-bottom:6px;line-height:1;
  transition:color 0.25s ease, text-shadow 0.25s ease;
}
.home-nav-label{
  font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:0.2em;text-transform:uppercase;
  text-align:center;line-height:1.3;
}
.home-nav-item:hover .home-nav-num{
  color:#f2d98c;
  text-shadow:0 0 14px rgba(220,180,100,0.55);
}

/* ── GM corner ── */
.gm-corner{
  position:fixed;bottom:12px;right:14px;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;
  color:rgba(200,160,80,0.5);
  background:rgba(10,5,18,0.6);
  border:1px solid rgba(200,160,80,0.18);
  padding:5px 10px;
  text-decoration:none;
  transition:all 0.2s ease;
  z-index:50;
}
.gm-corner:hover{color:var(--gold-bright);border-color:rgba(220,180,100,0.6)}

/* ── Responsive ── */
@media (max-width:900px){
  .home{padding:32px 14px 24px}
  .home-sigil{width:clamp(160px, 32vh, 260px);height:clamp(160px, 32vh, 260px)}
  .home-title{font-size:clamp(32px, 9vw, 48px)}
  .home-nav{grid-template-columns:repeat(2, 1fr)}
  .home-nav-item{min-height:80px;padding:14px 8px}
  .home-nav-num{font-size:22px}
  .home-nav-label{font-size:11px;letter-spacing:0.15em}
}
@media (max-width:500px){
  .home-nav{grid-template-columns:1fr}
}
