<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t06">
  <title id="t06">Atlas Sketch — Royal Survey</title>
  <!-- palette: locked tokens only. cartographic-standard symbology. NO purple — capital uses concentric-circle convention. -->

  <rect width="1600" height="1000" fill="#030106"/>

  <!-- Bordered map frame: double-line, restrained -->
  <rect x="80" y="80" width="1440" height="840" fill="none" stroke="#d8c99b" stroke-width="1.5"/>
  <rect x="92" y="92" width="1416" height="816" fill="none" stroke="#d8c99b" stroke-width="0.5" opacity="0.6"/>

  <!-- Title block in cartographic style -->
  <g font-family="Cinzel, serif" fill="#d8c99b" letter-spacing="5">
    <text x="100" y="120" font-size="13">ROYAL  SURVEY  OF  K'NAAN</text>
    <text x="100" y="140" font-size="10" fill="rgba(200,160,80,0.65)" letter-spacing="3">SHEET I · ASH-KADESH FOLIO · SCALE 1 : 24,000</text>
  </g>
  <line x1="100" y1="148" x2="500" y2="148" stroke="rgba(200,160,80,0.55)" stroke-width="0.5"/>

  <!-- Tick marks on inner frame (degrees / minutes) -->
  <g stroke="#d8c99b" stroke-width="0.8">
    <!-- top -->
    <line x1="240" y1="92" x2="240" y2="100"/>
    <line x1="400" y1="92" x2="400" y2="100"/>
    <line x1="560" y1="92" x2="560" y2="100"/>
    <line x1="720" y1="92" x2="720" y2="100"/>
    <line x1="880" y1="92" x2="880" y2="100"/>
    <line x1="1040" y1="92" x2="1040" y2="100"/>
    <line x1="1200" y1="92" x2="1200" y2="100"/>
    <line x1="1360" y1="92" x2="1360" y2="100"/>
    <!-- bottom -->
    <line x1="240" y1="900" x2="240" y2="908"/>
    <line x1="400" y1="900" x2="400" y2="908"/>
    <line x1="560" y1="900" x2="560" y2="908"/>
    <line x1="720" y1="900" x2="720" y2="908"/>
    <line x1="880" y1="900" x2="880" y2="908"/>
    <line x1="1040" y1="900" x2="1040" y2="908"/>
    <line x1="1200" y1="900" x2="1200" y2="908"/>
    <line x1="1360" y1="900" x2="1360" y2="908"/>
    <!-- left -->
    <line x1="92" y1="220" x2="100" y2="220"/>
    <line x1="92" y1="340" x2="100" y2="340"/>
    <line x1="92" y1="460" x2="100" y2="460"/>
    <line x1="92" y1="580" x2="100" y2="580"/>
    <line x1="92" y1="700" x2="100" y2="700"/>
    <line x1="92" y1="820" x2="100" y2="820"/>
    <!-- right -->
    <line x1="1500" y1="220" x2="1508" y2="220"/>
    <line x1="1500" y1="340" x2="1508" y2="340"/>
    <line x1="1500" y1="460" x2="1508" y2="460"/>
    <line x1="1500" y1="580" x2="1508" y2="580"/>
    <line x1="1500" y1="700" x2="1508" y2="700"/>
    <line x1="1500" y1="820" x2="1508" y2="820"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,160,80,0.55)" letter-spacing="1">
    <text x="240" y="86" text-anchor="middle">12°W</text>
    <text x="560" y="86" text-anchor="middle">10°W</text>
    <text x="880" y="86" text-anchor="middle">8°W</text>
    <text x="1200" y="86" text-anchor="middle">6°W</text>
  </g>

  <!-- District boundaries — precise, no fills, restrained hatch density patterns -->
  <!-- Crown-Shelf (top, sparse hatching = elevated) -->
  <polygon points="540,310 580,290 660,285 740,288 820,290 890,295 950,310 950,365 905,378 830,373 750,370 680,368 610,365 555,360 540,345"
           fill="none" stroke="#d8c99b" stroke-width="1"/>
  <g stroke="rgba(200,160,80,0.35)" stroke-width="0.4">
    <line x1="555" y1="320" x2="945" y2="320"/>
    <line x1="555" y1="335" x2="945" y2="335"/>
    <line x1="555" y1="350" x2="945" y2="350"/>
  </g>

  <!-- Ledger-Ward (middle, grid pattern = urban) -->
  <polygon points="520,420 560,402 640,395 740,397 850,400 920,408 950,420 950,495 910,505 840,503 760,500 690,500 620,503 555,505 520,495"
           fill="none" stroke="#d8c99b" stroke-width="1"/>
  <g stroke="rgba(200,160,80,0.30)" stroke-width="0.4">
    <line x1="540" y1="420" x2="940" y2="420"/>
    <line x1="540" y1="445" x2="940" y2="445"/>
    <line x1="540" y1="470" x2="940" y2="470"/>
    <line x1="540" y1="495" x2="940" y2="495"/>
    <line x1="600" y1="400" x2="600" y2="503"/>
    <line x1="680" y1="397" x2="680" y2="500"/>
    <line x1="760" y1="397" x2="760" y2="500"/>
    <line x1="840" y1="400" x2="840" y2="503"/>
    <line x1="920" y1="408" x2="920" y2="503"/>
  </g>

  <!-- The Mourn (bottom, stippling = decay) -->
  <polygon points="510,560 555,545 635,540 720,542 810,545 880,548 935,558 945,635 905,650 830,648 750,644 670,646 590,648 525,644 510,630"
           fill="none" stroke="#d8c99b" stroke-width="1"/>
  <g fill="rgba(200,160,80,0.45)">
    <circle cx="560" cy="585" r="0.8"/><circle cx="600" cy="595" r="0.8"/><circle cx="640" cy="580" r="0.8"/>
    <circle cx="690" cy="592" r="0.8"/><circle cx="720" cy="600" r="0.8"/><circle cx="770" cy="585" r="0.8"/>
    <circle cx="810" cy="600" r="0.8"/><circle cx="850" cy="588" r="0.8"/><circle cx="900" cy="600" r="0.8"/>
    <circle cx="555" cy="615" r="0.8"/><circle cx="600" cy="625" r="0.8"/><circle cx="650" cy="618" r="0.8"/>
    <circle cx="700" cy="630" r="0.8"/><circle cx="750" cy="615" r="0.8"/><circle cx="800" cy="625" r="0.8"/>
    <circle cx="850" cy="618" r="0.8"/><circle cx="895" cy="630" r="0.8"/>
  </g>

  <!-- Capital marker: cartographic-standard concentric-circle convention (NO purple) -->
  <g transform="translate(740, 460)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#d8c99b" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#d8c99b"/>
  </g>

  <!-- Restrained labels in small Cinzel uppercase -->
  <g font-family="Cinzel, serif" font-size="11" fill="#d8c99b" letter-spacing="3">
    <text x="745" y="335">CROWN-SHELF</text>
    <text x="745" y="465">LEDGER-WARD</text>
    <text x="752" y="600">THE MOURN</text>
  </g>
  <g font-family="Cinzel, serif" font-size="9" fill="rgba(200,160,80,0.65)" letter-spacing="2">
    <text x="755" y="446">ASH-KADESH</text>
  </g>

  <!-- South road: simple solid line, surveyed -->
  <line x1="740" y1="650" x2="740" y2="900" stroke="#d8c99b" stroke-width="1.2"/>
  <g font-family="Cinzel, serif" font-size="9" fill="rgba(200,160,80,0.65)" letter-spacing="2">
    <text x="752" y="780">ROAD · S</text>
  </g>
  <!-- Road tick markers (mile posts) -->
  <g stroke="#d8c99b" stroke-width="1">
    <line x1="734" y1="700" x2="746" y2="700"/>
    <line x1="734" y1="750" x2="746" y2="750"/>
    <line x1="734" y1="800" x2="746" y2="800"/>
    <line x1="734" y1="850" x2="746" y2="850"/>
  </g>

  <!-- Eastern Massif: contour lines at consistent intervals -->
  <g stroke="#d8c99b" stroke-width="0.8" fill="none">
    <path d="M 1100 220 Q 1180 250, 1240 270 T 1340 295 T 1450 320 T 1500 345"/>
    <path d="M 1090 280 Q 1170 305, 1230 325 T 1325 360 T 1430 395 T 1500 425"/>
    <path d="M 1080 340 Q 1160 365, 1220 385 T 1310 425 T 1420 470 T 1500 505"/>
    <path d="M 1080 400 Q 1170 425, 1230 445 T 1320 485 T 1430 535 T 1500 580"/>
    <path d="M 1090 460 Q 1170 485, 1230 505 T 1325 545 T 1435 600 T 1500 650"/>
    <path d="M 1100 520 Q 1180 545, 1240 565 T 1340 605 T 1450 660 T 1500 705"/>
    <path d="M 1110 580 Q 1190 605, 1250 625 T 1350 665 T 1450 720 T 1500 765"/>
  </g>
  <!-- Contour interval annotation -->
  <g font-family="JetBrains Mono, monospace" font-size="8" fill="rgba(200,160,80,0.65)" letter-spacing="1">
    <text x="1300" y="215">EASTERN MASSIF</text>
    <text x="1300" y="227">contour interval 50m</text>
  </g>

  <!-- Spot heights along the foothill edge -->
  <g font-family="JetBrains Mono, monospace" font-size="8" fill="#d8c99b">
    <text x="1380" y="320">·417</text>
    <text x="1330" y="430">·382</text>
    <text x="1410" y="540">·451</text>
    <text x="1340" y="660">·334</text>
  </g>

  <!-- Scale bar (kilometres + leagues) -->
  <g transform="translate(120, 850)">
    <line x1="0" y1="0" x2="240" y2="0" stroke="#d8c99b" stroke-width="1.5"/>
    <rect x="0" y="-4" width="40" height="8" fill="#d8c99b"/>
    <rect x="80" y="-4" width="40" height="8" fill="#d8c99b"/>
    <rect x="160" y="-4" width="40" height="8" fill="#d8c99b"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#d8c99b" stroke-width="1"/>
    <line x1="40" y1="-6" x2="40" y2="6" stroke="#d8c99b" stroke-width="1"/>
    <line x1="80" y1="-6" x2="80" y2="6" stroke="#d8c99b" stroke-width="1"/>
    <line x1="120" y1="-6" x2="120" y2="6" stroke="#d8c99b" stroke-width="1"/>
    <line x1="160" y1="-6" x2="160" y2="6" stroke="#d8c99b" stroke-width="1"/>
    <line x1="200" y1="-6" x2="200" y2="6" stroke="#d8c99b" stroke-width="1"/>
    <line x1="240" y1="-6" x2="240" y2="6" stroke="#d8c99b" stroke-width="1"/>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#d8c99b" text-anchor="middle">
      <text x="0" y="-12">0</text>
      <text x="80" y="-12">2</text>
      <text x="160" y="-12">4</text>
      <text x="240" y="-12">6</text>
    </g>
    <text x="120" y="22" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,160,80,0.65)" text-anchor="middle" letter-spacing="2">LEAGUES</text>
  </g>

  <!-- North arrow (cartographic minimal) -->
  <g transform="translate(1440, 870)">
    <line x1="0" y1="20" x2="0" y2="-20" stroke="#d8c99b" stroke-width="1"/>
    <polygon points="0,-22 5,-8 0,-12 -5,-8" fill="#d8c99b"/>
    <text x="0" y="-30" font-family="JetBrains Mono, monospace" font-size="11" fill="#d8c99b" text-anchor="middle">N</text>
  </g>

  <!-- Legend -->
  <g transform="translate(1140, 850)" font-family="JetBrains Mono, monospace" font-size="8" fill="rgba(200,160,80,0.85)" letter-spacing="1">
    <rect x="-10" y="-30" width="220" height="68" fill="none" stroke="rgba(200,160,80,0.40)" stroke-width="0.5"/>
    <text x="0" y="-15" letter-spacing="2">LEGEND</text>
    <g transform="translate(0, 0)">
      <circle cx="0" cy="0" r="5" fill="none" stroke="#d8c99b" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#d8c99b"/>
      <text x="14" y="3">national capital</text>
    </g>
    <g transform="translate(0, 14)">
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#d8c99b" stroke-width="1.2"/>
      <text x="14" y="3">surveyed road</text>
    </g>
    <g transform="translate(0, 28)">
      <path d="M -8 0 Q -2 -3, 4 0 T 12 0" stroke="#d8c99b" stroke-width="0.8" fill="none"/>
      <text x="14" y="3">contour (50m)</text>
    </g>
  </g>

  <!-- Bottom-right cartouche -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,160,80,0.55)" letter-spacing="1">
    <text x="1500" y="940" text-anchor="end">surveyed by the Crown · folio I/XII · revised draft</text>
  </g>
</svg>
