<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="t01">
  <title id="t01">Atlas Sketch — Cartographer's Draft</title>
  <!-- palette: locked tokens only. extension: schematic-blue rgba(120,150,200,0.10) for grid wash -->

  <rect width="1600" height="1000" fill="#030106"/>

  <!-- Faint coordinate grid (extension token: schematic blue) -->
  <g stroke="rgba(120,150,200,0.10)" stroke-width="1">
    <line x1="100" y1="60" x2="100" y2="940"/><line x1="200" y1="60" x2="200" y2="940"/>
    <line x1="300" y1="60" x2="300" y2="940"/><line x1="400" y1="60" x2="400" y2="940"/>
    <line x1="500" y1="60" x2="500" y2="940"/><line x1="600" y1="60" x2="600" y2="940"/>
    <line x1="700" y1="60" x2="700" y2="940"/><line x1="800" y1="60" x2="800" y2="940"/>
    <line x1="900" y1="60" x2="900" y2="940"/><line x1="1000" y1="60" x2="1000" y2="940"/>
    <line x1="1100" y1="60" x2="1100" y2="940"/><line x1="1200" y1="60" x2="1200" y2="940"/>
    <line x1="1300" y1="60" x2="1300" y2="940"/><line x1="1400" y1="60" x2="1400" y2="940"/>
    <line x1="1500" y1="60" x2="1500" y2="940"/>
    <line x1="60" y1="100" x2="1540" y2="100"/><line x1="60" y1="200" x2="1540" y2="200"/>
    <line x1="60" y1="300" x2="1540" y2="300"/><line x1="60" y1="400" x2="1540" y2="400"/>
    <line x1="60" y1="500" x2="1540" y2="500"/><line x1="60" y1="600" x2="1540" y2="600"/>
    <line x1="60" y1="700" x2="1540" y2="700"/><line x1="60" y1="800" x2="1540" y2="800"/>
    <line x1="60" y1="900" x2="1540" y2="900"/>
  </g>

  <!-- Map frame -->
  <rect x="60" y="60" width="1480" height="880" fill="none" stroke="rgba(200,160,80,0.55)" stroke-width="1.5"/>

  <!-- Sheet header (cartographer marginalia, register-flavor not lore claim) -->
  <text x="80" y="100" font-family="JetBrains Mono, monospace" font-size="14" fill="#d8c99b" letter-spacing="2">SHEET I — ASH-KADESH ENVIRONS · scale 1:24,000 · pre-revision</text>

  <!-- Crown-Shelf district (top — long ridge) -->
  <polygon points="510,300 540,278 600,272 700,275 800,278 880,285 945,300 950,360 920,378 850,373 780,368 710,365 640,365 580,360 532,355 510,340"
           fill="rgba(200,160,80,0.06)" stroke="#d8c99b" stroke-width="1.5"/>
  <!-- Ledger-Ward district (middle) -->
  <polygon points="490,420 530,402 600,395 700,397 810,400 890,408 940,420 950,500 920,510 850,508 780,505 710,505 640,508 580,510 530,508 495,498"
           fill="rgba(200,160,80,0.04)" stroke="#d8c99b" stroke-width="1.5"/>
  <!-- The Mourn district (bottom) -->
  <polygon points="475,560 525,545 605,540 700,542 800,545 880,548 935,558 945,640 905,655 830,652 750,648 670,650 590,652 525,648 480,635"
           fill="rgba(200,160,80,0.03)" stroke="#d8c99b" stroke-width="1.5"/>

  <!-- Capital marker: purple star at city centroid -->
  <circle cx="715" cy="470" r="22" fill="rgba(95,55,130,0.30)"/>
  <polygon points="715,448 720,464 738,464 723,475 729,492 715,481 701,492 707,475 692,464 710,464"
           fill="#f2d98c" stroke="#d8c99b" stroke-width="1"/>

  <!-- District labels (fixed-width annotation w/ leader lines) -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="rgba(200,160,80,0.85)" letter-spacing="1.5">
    <line x1="200" y1="320" x2="510" y2="320" stroke="rgba(200,160,80,0.40)" stroke-width="1"/>
    <text x="80" y="324">[01] CROWN-SHELF</text>
    <line x1="200" y1="460" x2="490" y2="460" stroke="rgba(200,160,80,0.40)" stroke-width="1"/>
    <text x="80" y="464">[02] LEDGER-WARD</text>
    <line x1="200" y1="600" x2="475" y2="600" stroke="rgba(200,160,80,0.40)" stroke-width="1"/>
    <text x="80" y="604">[03] THE  MOURN</text>
  </g>

  <!-- Capital callout -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#f2d98c" letter-spacing="1">
    <line x1="800" y1="430" x2="735" y2="460" stroke="rgba(200,160,80,0.55)" stroke-width="1"/>
    <text x="810" y="430">ASH-KADESH (capital)</text>
    <text x="810" y="445" font-size="9" fill="rgba(200,160,80,0.55)">— purple-star marker —</text>
  </g>

  <!-- South road: dashed polyline -->
  <polyline points="715,650 720,720 712,790 728,860 720,940"
            fill="none" stroke="#d8c99b" stroke-width="2" stroke-dasharray="10,5"/>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(200,160,80,0.55)" letter-spacing="1">
    <text x="740" y="800">→ ROAD SOUTH</text>
  </g>

  <!-- Eastern Massif foothill — fading dashed contour lines -->
  <g stroke="#d8c99b" stroke-width="1" fill="none">
    <path d="M 1100 200 Q 1180 240, 1240 260 T 1340 290 T 1450 320 T 1520 360" stroke-dasharray="6,4" stroke-opacity="0.65"/>
    <path d="M 1080 280 Q 1170 310, 1230 330 T 1320 365 T 1430 405 T 1510 450" stroke-dasharray="5,5" stroke-opacity="0.50"/>
    <path d="M 1070 360 Q 1160 380, 1220 400 T 1310 440 T 1420 490 T 1505 540" stroke-dasharray="4,6" stroke-opacity="0.40"/>
    <path d="M 1080 440 Q 1170 460, 1230 480 T 1320 520 T 1430 575 T 1515 630" stroke-dasharray="3,7" stroke-opacity="0.30"/>
    <path d="M 1100 520 Q 1180 545, 1240 565 T 1335 605 T 1445 660 T 1525 720" stroke-dasharray="2,8" stroke-opacity="0.25"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(200,160,80,0.65)" letter-spacing="1">
    <text x="1180" y="180">EASTERN MASSIF · foothill edge</text>
    <text x="1180" y="196" font-size="9" fill="rgba(200,160,80,0.40)">(contour interval 50m, schematic)</text>
  </g>

  <!-- North arrow -->
  <g transform="translate(1450, 130)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(200,160,80,0.55)" stroke-width="1"/>
    <polygon points="0,-18 4,2 0,-4 -4,2" fill="#d8c99b"/>
    <text x="0" y="-26" font-family="JetBrains Mono, monospace" font-size="11" fill="#d8c99b" text-anchor="middle">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(80, 880)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#d8c99b" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#d8c99b" stroke-width="1.5"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#d8c99b" stroke-width="1"/>
    <line x1="120" y1="-3" x2="120" y2="3" stroke="#d8c99b" stroke-width="1"/>
    <line x1="180" y1="-5" x2="180" y2="5" stroke="#d8c99b" stroke-width="1.5"/>
    <text x="0" y="-10" font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(200,160,80,0.65)" text-anchor="middle">0</text>
    <text x="60" y="-10" font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(200,160,80,0.65)" text-anchor="middle">2</text>
    <text x="120" y="-10" font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(200,160,80,0.65)" text-anchor="middle">4</text>
    <text x="180" y="-10" font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(200,160,80,0.65)" text-anchor="middle">6 leagues</text>
  </g>

  <text x="1530" y="920" font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(200,160,80,0.40)" text-anchor="end">drafted · pre-revision · sheet 01 of XII</text>
</svg>
